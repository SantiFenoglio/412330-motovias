spring.application.name=motovias-backend

# Bind explícito a todas las interfaces — necesario cuando corre en Docker
# para que el puente de red de Windows pueda alcanzar el contenedor.
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://localhost:5432/motovias_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Esto hace que Hibernate cree las tablas solas basándose en tus entidades de Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT - Cambiá el secret en producción por uno generado con: openssl rand -base64 64
jwt.secret=bW90b3ZpYXMtand0LXN1cGVyLXNlY3JldC1rZXktcGFyYS1obWFjLXNoYTI1Ni0yMDI1LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=
jwt.expiration=86400000