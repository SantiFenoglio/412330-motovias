# ──────────────────────────────────────────────────────────────────
# Perfil "test": H2 en memoria reemplaza a PostgreSQL.
# Activar con @ActiveProfiles("test") en cada test de integración.
# ──────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:motovias_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

