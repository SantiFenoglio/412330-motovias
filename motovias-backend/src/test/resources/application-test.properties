# ──────────────────────────────────────────────────────────────────
# Perfil "test": H2 en memoria reemplaza a PostgreSQL.
# Activar con @ActiveProfiles("test") en cada test de integración.
# ──────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:motovias_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'none' porque el schema lo provee schema-test.sql; evita que Hibernate intente
# crear columnas con columnDefinition PostGIS (geometry(Point,4326)) en H2.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

