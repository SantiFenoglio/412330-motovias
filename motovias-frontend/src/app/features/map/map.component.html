<main class="map-page" aria-label="Mapa interactivo de Motovías">
  <header class="map-header">
    <span class="brand">Motovías</span>
    <button
      class="logout-btn"
      type="button"
      (click)="logout()"
      aria-label="Cerrar sesión"
    >
      <i class="pi pi-sign-out" aria-hidden="true"></i>
      <span>Salir</span>
    </button>
  </header>

  <div class="map-body">
    <!-- Panel de filtros flotante sobre el mapa -->
    <app-filter-panel />

    <!-- Contenedor del mapa Leaflet -->
    <div
      #mapContainer
      class="map-container"
      role="region"
      aria-label="Mapa cartográfico de rutas"
    ></div>

    <!-- Botón flotante de recentrado en ubicación actual -->
    <div class="recenter-wrapper">
      <p-button
        icon="pi pi-bullseye"
        [rounded]="true"
        severity="info"
        size="large"
        (onClick)="recenter()"
        ariaLabel="Centrar mapa en mi ubicación"
        pTooltip="Mi ubicación"
        tooltipPosition="left"
      />
    </div>
  </div>

  <!-- Popup de detalle del marcador seleccionado -->
  <app-reporte-popup
    [punto]="selectedPunto()"
    (closed)="selectedPunto.set(null)"
  />
</main>
