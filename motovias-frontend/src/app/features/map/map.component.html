<main class="map-page" aria-label="Mapa interactivo de Motovías">
  <div class="map-body">
    <!-- Panel de filtros flotante sobre el mapa -->
    <app-filter-panel />

    <!-- Contenedor del mapa Leaflet -->
    <div
      #mapContainer
      class="map-container"
      role="region"
      aria-label="Mapa cartográfico de rutas"
    ></div>

    <!-- Botones flotantes -->
    <div class="recenter-wrapper">
      <p-button
        icon="pi pi-plus"
        [rounded]="true"
        severity="success"
        size="large"
        (onClick)="showReporteForm.set(true)"
        ariaLabel="Crear nuevo reporte"
        pTooltip="Nuevo reporte"
        tooltipPosition="left"
      />
      <p-button
        icon="pi pi-bullseye"
        [rounded]="true"
        severity="info"
        size="large"
        (onClick)="recenter()"
        ariaLabel="Centrar mapa en mi ubicación"
        pTooltip="Mi ubicación"
        tooltipPosition="left"
      />
    </div>
  </div>

  <!-- Popup de detalle del marcador seleccionado -->
  <app-reporte-popup
    [punto]="selectedPunto()"
    (closed)="selectedPunto.set(null)"
  />

  <!-- Formulario de nuevo reporte -->
  <app-reporte-form
    [visible]="showReporteForm()"
    (closed)="showReporteForm.set(false)"
  />
</main>
